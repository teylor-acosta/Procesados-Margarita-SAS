<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empleados</title>

<!-- FUENTE -->
<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- ESTILOS -->
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/empleados.css">

</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar-custom">
    <div class="navbar-left">
        <img src="img/logo de procesados sin NIT.png" class="logo-navbar">
        <span class="empresa-nombre">Procesados Margarita SAS</span>
    </div>

    <div style="display:flex; gap:10px;">
        <a href="/empleados-menu" class="btn btn-light">
            <i class="fas fa-arrow-left"></i> Volver
        </a>

        <a href="/logout" class="btn-logout">
            <i class="fas fa-power-off"></i> Cerrar sesión
        </a>
    </div>
</nav>

<!-- 🔥 CONTENIDO -->
<div class="empleados-container">

    <!-- TITULO -->
    <div class="titulo-panel text-center mb-4">
        <h2>Gestión de Empleados</h2>
    </div>

    <!-- 🔎 FILTROS -->
    <div class="filtros-barra">

        <input id="buscadorEmpleado" class="form-control input-busqueda" placeholder="Buscar empleado...">

        <select id="filtroArea" class="form-control filtro">
            <option value="">Área</option>
        </select>

        <select id="filtroSede" class="form-control filtro">
            <option value="">Sede</option>
        </select>

        <select id="filtroCargo" class="form-control filtro">
            <option value="">Cargo</option>
        </select>

        <select id="filtroTipoDoc" class="form-control filtro">
            <option value="">Tipo Doc</option>
            <option value="CC">CC</option>
            <option value="TI">TI</option>
            <option value="CE">CE</option>
            <option value="PAS">PAS</option>
            <option value="PPT">PPT</option>
        </select>

        <!-- LIMPIAR -->
        <button id="btnLimpiar" class="btn btn-secondary btn-icon">
            <i class="fas fa-broom"></i>
        </button>

        <!-- NUEVO -->
        <a href="/crear-empleado" class="btn btn-nuevo">
            <i class="fas fa-plus"></i> Nuevo
        </a>

    </div>

    <!-- 🔥 TABLA -->
    <div class="tabla-container">

        <div class="table-responsive">

            <table class="tabla-corporativa">

                <!-- 🔥 ENCABEZADO (IMPORTANTE) -->
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Documento</th>
                        <th>Tipo Doc</th>
                        <th>Fecha Nac</th>
                        <th>Lugar Nac</th>
                        <th>RH</th>
                        <th>Estado Civil</th>
                        <th>Dirección</th>
                        <th>Barrio</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Área</th>
                        <th>Sede</th>
                        <th>Cargo</th>
                        <th>Activo</th>
                    </tr>
                </thead>

                <!-- 🔥 DATA -->
                <tbody id="tablaEmpleados">
                    <!-- Se llena con JS -->
                </tbody>

            </table>

        </div>

        <!-- PAGINACIÓN -->
        <ul id="paginacion" class="pagination justify-content-center mt-3"></ul>

    </div>

</div>

<!-- 🔥 MODAL EDITAR -->
<div class="modal fade" id="modalEmpleado" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content p-4">

            <div class="modal-header border-0">
                <h5 class="modal-title">Editar empleado</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input id="edit_id" hidden>

                <div class="row g-3">

                    <div class="col-md-6">
                        <label>Nombre</label>
                        <input id="edit_nombre" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>Documento</label>
                        <input id="edit_documento" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>Tipo documento</label>
                        <select id="edit_tipo_documento" class="form-control">
                            <option value="">Seleccione</option>
                            <option value="CC">CC</option>
                            <option value="TI">TI</option>
                            <option value="CE">CE</option>
                            <option value="PAS">PAS</option>
                            <option value="PPT">PPT</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label>Fecha nacimiento</label>
                        <input id="edit_fecha_nacimiento" type="date" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>Lugar nacimiento</label>
                        <input id="edit_lugar_nacimiento" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>RH</label>
                        <input id="edit_rh" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>Estado civil</label>
                        <input id="edit_estado_civil" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>Barrio</label>
                        <input id="edit_barrio" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>Dirección</label>
                        <input id="edit_direccion" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>Teléfono</label>
                        <input id="edit_telefono" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>Email</label>
                        <input id="edit_email" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label>Área</label>
                        <select id="edit_area" class="form-control"></select>
                    </div>

                    <div class="col-md-4">
                        <label>Sede</label>
                        <select id="edit_sede" class="form-control"></select>
                    </div>

                    <div class="col-md-4">
                        <label>Cargo</label>
                        <select id="edit_cargo" class="form-control"></select>
                    </div>

                </div>

            </div>

            <div class="modal-footer border-0">

                <button class="btn btn-danger" onclick="desactivarDesdeModal()">
                    Desactivar
                </button>

                <button class="btn btn-success" onclick="actualizarEmpleado()">
                    Actualizar
                </button>

            </div>

        </div>
    </div>
</div>

<!-- 🔥 SCRIPTS (IMPORTANTE) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/empleados.js"></script>

</body>
</html>
