<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empleados</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="dashboard-body">

<nav class="navbar-custom">
    <span class="empresa-nombre">Empleados</span>
    <a href="/empleados-menu" class="btn btn-light">← Volver</a>
</nav>

<!-- 🔥 CAMBIO CLAVE -->
<div class="container-fluid mt-4 px-4">

<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">

    <input id="buscadorEmpleado" class="form-control"
        placeholder="Buscar..." style="width: 220px;">

    <div class="d-flex flex-row flex-nowrap align-items-center gap-2 w-100">

        <select id="filtroArea" class="form-control" style="width: 160px;"></select>
        <select id="filtroSede" class="form-control" style="width: 160px;"></select>
        <select id="filtroCargo" class="form-control" style="width: 160px;"></select>

        <select id="filtroTipoDoc" class="form-control" style="width: 140px;">
            <option value="">Tipo Doc</option>
            <option value="CC">CC</option>
            <option value="TI">TI</option>
            <option value="CE">CE</option>
            <option value="PAS">PAS</option>
            <option value="PPT">PPT</option>
        </select>

        <button id="btnLimpiar" class="btn btn-secondary">
            <i class="fas fa-broom"></i>
        </button>

        <a href="/crear-empleado" class="btn btn-success" onclick="limpiarEmpleado()">
            <i class="fas fa-plus"></i> Nuevo
        </a>

    </div>

</div>

<div class="card p-3">

<div class="table-responsive">
<table class="table table-dark table-hover text-center align-middle tabla-fija">

<thead class="table-success text-dark">
<tr>
<th>Código</th>
<th>Nombre</th>
<th>Documento</th>
<th>Tipo Doc</th>
<th>Fecha Nac</th>
<th>Lugar Nac</th>
<th>RH</th>
<th>Estado Civil</th>
<th>Dirección</th>
<th>Barrio</th>
<th>Teléfono</th>
<th>Email</th>
<th>Área</th>
<th>Sede</th>
<th>Cargo</th>
<th>Activo</th>
</tr>
</thead>

<tbody id="tablaEmpleados"></tbody>

</table>
</div>

<ul class="pagination justify-content-center" id="paginacion"></ul>

</div>

</div>

<!-- MODAL (NO TOCADO) -->
<div class="modal fade" id="modalEmpleado">
<div class="modal-dialog modal-lg">
<div class="modal-content">

<div class="modal-header">
<h5>Editar empleado</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input type="hidden" id="edit_id">

<div class="row g-3">

<div class="col-md-6">
<label>Nombre</label>
<input id="edit_nombre" class="form-control">
</div>

<div class="col-md-6">
<label>Documento</label>
<input id="edit_documento" class="form-control">
</div>

<div class="col-md-6">
<label>Tipo documento</label>
<select id="edit_tipo_documento" class="form-control">
<option value="CC">CC</option>
<option value="TI">TI</option>
<option value="CE">CE</option>
<option value="PAS">PAS</option>
<option value="PPT">PPT</option>
</select>
</div>

<div class="col-md-6">
<label>Fecha nacimiento</label>
<input type="date" id="edit_fecha_nacimiento" class="form-control">
</div>

<div class="col-md-6">
<label>Lugar nacimiento</label>
<input id="edit_lugar_nacimiento" class="form-control">
</div>

<div class="col-md-6">
<label>RH</label>
<input id="edit_rh" class="form-control">
</div>

<div class="col-md-6">
<label>Estado civil</label>
<input id="edit_estado_civil" class="form-control">
</div>

<div class="col-md-6">
<label>Barrio</label>
<input id="edit_barrio" class="form-control">
</div>

<div class="col-md-6">
<label>Dirección</label>
<input id="edit_direccion" class="form-control">
</div>

<div class="col-md-6">
<label>Teléfono</label>
<input id="edit_telefono" class="form-control">
</div>

<div class="col-md-6">
<label>Email</label>
<input id="edit_email" class="form-control">
</div>

<div class="col-md-4">
<label>Área</label>
<select id="edit_area" class="form-control"></select>
</div>

<div class="col-md-4">
<label>Sede</label>
<select id="edit_sede" class="form-control"></select>
</div>

<div class="col-md-4">
<label>Cargo</label>
<select id="edit_cargo" class="form-control"></select>
</div>

</div>
</div>

<div class="modal-footer">
<button class="btn btn-danger" onclick="desactivarDesdeModal()">Desactivar</button>
<button class="btn btn-success" onclick="actualizarEmpleado()">Actualizar</button>
</div>

</div>
</div>
</div>

<script src="/js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/empleados.js"></script>

</body>
</html>
