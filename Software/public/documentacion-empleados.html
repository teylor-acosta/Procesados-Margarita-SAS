<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Documentación Empleados</title>

<!-- FUENTE -->
<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- ESTILOS -->
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/documentacion-empleados.css">

<link rel="icon" href="img/Gemini_Generated_Image_bo9w5fbo9w5fbo9w-removebg-preview.png">

</head>

<body>

<!-- =========================================
     🔝 NAVBAR
========================================= -->

<nav class="navbar-custom">

    <div class="navbar-left">

        <img 
            src="img/logo de procesados sin NIT.png" 
            class="logo-navbar"
        >

        <span class="empresa-nombre">
            Procesados Margarita SAS
        </span>

    </div>

    <div class="acciones-navbar">

        <a href="/empleados-menu" class="btn btn-light">
            <i class="fas fa-arrow-left"></i> Volver
        </a>

        <a href="/logout" class="btn-logout">
            <i class="fas fa-power-off"></i>
            Cerrar sesión
        </a>

    </div>

</nav>


<!-- =========================================
     🎯 CONTENIDO
========================================= -->

<div class="documentacion-container">


    <!-- TITULO -->

    <div class="titulo-documentacion">

        <h2>
            Gestión Documental de Empleados
        </h2>

    </div>


    <!-- =========================================
         📊 RESUMEN
    ========================================= -->

    <div class="resumen-documentos">


        <!-- COMPLETOS -->

        <div class="card-resumen card-completo">

            <div class="icono-resumen">
                <i class="fas fa-circle-check"></i>
            </div>

            <div>

                <h3 id="totalCompleto">
                    0
                </h3>

                <p>
                    Documentación completa
                </p>

            </div>

        </div>


        <!-- PENDIENTES -->

        <div class="card-resumen card-pendiente">

            <div class="icono-resumen">
                <i class="fas fa-clock"></i>
            </div>

            <div>

                <h3 id="totalPendiente">
                    0
                </h3>

                <p>
                    Documentación pendiente
                </p>

            </div>

        </div>


        <!-- INCOMPLETOS -->

        <div class="card-resumen card-alerta">

            <div class="icono-resumen">
                <i class="fas fa-triangle-exclamation"></i>
            </div>

            <div>

                <h3 id="totalIncompleto">
                    0
                </h3>

                <p>
                    Documentación incompleta
                </p>

            </div>

        </div>

    </div>


    <!-- =========================================
         🔎 BUSCADOR
    ========================================= -->

    <div class="barra-busqueda">

        <div class="input-group">

            <span class="input-group-text">
                <i class="fas fa-search"></i>
            </span>

            <input 
                type="text"
                class="form-control"
                placeholder="Buscar empleado..."
                id="buscarEmpleado"
            >

        </div>

    </div>


    <!-- =========================================
         👥 EMPLEADOS
    ========================================= -->

    <div 
        id="contenedorEmpleados" 
        class="grid-empleados"
    >

    </div>


</div>


<!-- =========================================
     🚀 SCRIPT
========================================= -->

<script src="js/documentacion-empleados.js"></script>

</body>
</html>
