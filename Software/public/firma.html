<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firma Digital - Procesados Margarita</title>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style_induccion.css">
</head>
<body>
    <div class="background-overlay">
        <nav class="navbar-custom">
            <img src="img/logo de procesados sin NIT.png" height="55" alt="Logo">
            <a href="/logout" class="btn-logout"><i class="fas fa-power-off me-2"></i>Cerrar Sesión</a>
        </nav>

        <div class="container py-5">
            <div class="firma-container">
                <div class="firma-card">
                    <div class="firma-titulo">
                        <i class="fas fa-signature fa-3x text-success mb-3"></i>
                        <h2>Firma Digital</h2>
                        <p>Formaliza la finalización de tu capacitación</p>
                    </div>

                    <div class="firma-area">
                        <p class="text-muted mb-3">Usa tu mouse o el dedo (en dispositivos táctiles) para firmar:</p>
                        <canvas id="firmaCanvas" width="500" height="200" style="width:100%; max-width:500px; height:200px; border:2px solid #ddd; border-radius:12px; background:white;"></canvas>
                        
                        <div class="firma-botones">
                            <button class="btn-firma-borrar" id="btnBorrar">
                                <i class="fas fa-eraser me-1"></i> Borrar
                            </button>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button class="btn-firma-finalizar" id="btnFinalizar">
                            <i class="fas fa-check-circle me-2"></i>Finalizar Inducción
                        </button>
                        <div class="mt-3">
                            <a href="/induccion" class="btn-volver-modulos">
                                <i class="fas fa-arrow-left me-2"></i>Volver a los módulos
                            </a>
                        </div>
                    </div>

                    <div id="mensajeExito" style="display: none;" class="firma-exito">
                        <i class="fas fa-check-circle"></i>
                        <h4>¡Firma guardada exitosamente!</h4>
                        <p>Redirigiendo al certificado...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firma.js"></script>
</body>
</html>
