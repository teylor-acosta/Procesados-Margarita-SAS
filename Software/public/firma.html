<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Firma Digital</title>

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- ESTILOS -->
    <link rel="stylesheet" href="/css/style1.css">
    <link rel="stylesheet" href="/css/firma.css">

    <!-- ICONO -->
    <link rel="icon" href="/img/Gemini_Generated_Image_bo9w5fbo9w5fbo9w-removebg-preview.png">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar-custom">

        <div class="navbar-left">

            <img 
                src="/img/logo de procesados sin NIT.png"
                class="logo-navbar"
                alt="Logo"
            >

            <span class="empresa-nombre">
                Procesados Margarita SAS
            </span>

        </div>

        <div class="navbar-right">

            <a href="/logout" class="btn-logout">

                <i class="fas fa-power-off"></i>
                Cerrar sesión

            </a>

        </div>

    </nav>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="firma-container">

        <!-- TARJETA -->
        <section class="firma-card">

            <!-- HEADER -->
            <div class="firma-header">

                <div class="firma-icono">

                    <i class="fas fa-signature"></i>

                </div>

                <h1>Firma Digital</h1>

                <p>
                    Formaliza la finalización de tu capacitación
                </p>

            </div>

            <!-- CONTENIDO -->
            <div class="firma-content">

                <!-- LABEL -->
                <label for="inputFirma" class="label-firma">

                    <i class="fas fa-upload"></i>

                    Subir imagen de la firma

                </label>

                <!-- INPUT -->
                <input
                    type="file"
                    id="inputFirma"
                    accept="image/*"
                    class="form-control input-firma"
                >

                <!-- PREVIEW -->
                <div class="preview-box">

                    <!-- IMAGEN -->
                    <img
                        id="previewFirma"
                        alt="Vista previa firma"
                    >

                    <!-- PLACEHOLDER -->
                    <div id="placeholderFirma">

                        <i class="fas fa-image"></i>

                        <h4>
                            Vista previa
                        </h4>

                        <p>
                            La firma aparecerá aquí automáticamente
                        </p>

                    </div>

                </div>

                <!-- BOTONES -->
                <div class="firma-actions">

                    <!-- BORRAR -->
                    <button
                        type="button"
                        class="btn-firma-borrar"
                        onclick="limpiarFirma()"
                    >

                        <i class="fas fa-trash"></i>

                        Borrar firma

                    </button>

                    <!-- FINALIZAR -->
                    <button
                        type="button"
                        class="btn-firma-finalizar"
                        id="btnFinalizar"
                    >

                        <i class="fas fa-check-circle"></i>

                        Finalizar inducción

                    </button>

                </div>

                <!-- LINK -->
                <div class="volver-box">

                    <a href="/induccion" class="btn-volver-modulos">

                        <i class="fas fa-arrow-left"></i>

                        Volver a los modulos

                    </a>

                </div>

                <!-- MENSAJE -->
                <div
                    id="mensajeExito"
                    class="firma-exito"
                    style="display:none;"
                >

                    <i class="fas fa-check-circle"></i>

                    <h4>
                        ¡Firma guardada exitosamente!
                    </h4>

                    <p>
                        Redirigiendo al certificado...
                    </p>

                </div>

            </div>

        </section>

    </main>

    <!-- JS -->
    <script src="/js/firma.js"></script>

</body>
</html>
