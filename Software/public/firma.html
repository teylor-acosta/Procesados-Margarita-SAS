<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firma Digital - Procesados Margarita</title>

    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="img/Gemini_Generated_Image_bo9w5fbo9w5fbo9w-removebg-preview.png">
    <link rel="stylesheet" href="css/style_induccion.css">
</head>

<body>
<div class="background-overlay">

<nav class="navbar-custom">

    <div style="display:flex; align-items:center; gap:10px;">
        <img src="img/logo de procesados sin NIT.png">
        <span style="font-weight:700; color:#2f3542;">
            Procesados Margarita SAS
        </span>
    </div>

    <a href="/logout" class="btn-logout">
        <i class="fas fa-power-off"></i> Cerrar sesión
    </a>

</nav>

    <div class="container py-5">
        <div class="firma-container">
            <div class="firma-card">

                <div class="firma-titulo">
                    <i class="fas fa-signature fa-3x text-success mb-3"></i>
                    <h2>Firma Digital</h2>
                    <p>Formaliza la finalización de tu capacitación</p>
                </div>

                <!-- 🔥 NUEVO: SUBIR IMAGEN -->
                <div class="firma-area">

                    <p class="text-muted mb-3">
                        Sube una imagen de tu firma:
                    </p>

                    <input type="file" id="inputFirma" accept="image/*" class="form-control">

                    <img id="previewFirma" 
                         style="margin-top:15px; max-width:100%; display:none; border-radius:12px; border:1px solid #ccc;">

                    <div class="firma-botones mt-3">
                        <button class="btn-firma-borrar" onclick="limpiarFirma()">
                            <i class="fas fa-eraser me-1"></i> Borrar
                        </button>
                    </div>

                </div>

                <div class="text-center mt-4">
                    <button class="btn-firma-finalizar" id="btnFinalizar">
                        <i class="fas fa-check-circle me-2"></i>Finalizar Inducción
                    </button>

                    <div class="mt-3">
                        <a href="/induccion" class="btn-volver-modulos">
                            <i class="fas fa-arrow-left me-2"></i>Volver a los módulos
                        </a>
                    </div>
                </div>

                <div id="mensajeExito" style="display:none;" class="firma-exito">
                    <i class="fas fa-check-circle"></i>
                    <h4>¡Firma guardada exitosamente!</h4>
                    <p>Redirigiendo al certificado...</p>
                </div>

            </div>
        </div>
    </div>

</div>

<script src="js/firma.js"></script>
</body>
</html>
