<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="perfil-container">
    <div class="perfil-card">

        <!-- FOTO -->
        <div class="perfil-foto text-center">
            <img id="foto" class="avatar" src="img/default.png">

            <input type="file" id="inputFoto" hidden>

            <button class="btn btn-success mt-2" onclick="subirFoto()">
                Cambiar foto
            </button>
        </div>

        <!-- INFO -->
        <div class="perfil-info">

            <h3 id="nombre"></h3>
            <p id="cargo"></p>

            <hr>

            <div class="row">

                <div class="col-md-6">
                    <p><strong>Código:</strong> <span id="codigo"></span></p>
                    <p><strong>Tipo Documento:</strong> <span id="tipo_doc"></span></p>
                    <p><strong>Documento:</strong> <span id="doc"></span></p>
                    <p><strong>RH:</strong> <span id="rh"></span></p>
                    <p><strong>Fecha Nacimiento:</strong> <span id="fecha"></span></p>
                    <p><strong>Lugar Nacimiento:</strong> <span id="lugar"></span></p>
                    <p><strong>Estado Civil:</strong> <span id="estado"></span></p>
                </div>

                <div class="col-md-6">
                    <p><strong>Dirección:</strong> <span id="direccion"></span></p>
                    <p><strong>Barrio:</strong> <span id="barrio"></span></p>
                    <p><strong>Teléfono:</strong> <span id="telefono"></span></p>
                    <p><strong>Email:</strong> <span id="email"></span></p>
                    <p><strong>Área:</strong> <span id="area"></span></p>
                    <p><strong>Sede:</strong> <span id="sede"></span></p>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="js/perfil.js"></script>

</body>
</html>
