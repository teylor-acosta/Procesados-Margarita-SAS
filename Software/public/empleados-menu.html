<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Módulo Empleados</title>

<!-- FUENTE -->
<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- ESTILOS -->
<link rel="stylesheet" href="css/style.css"> <!-- generales -->
<link rel="stylesheet" href="css/empleados-menu.css">

<link rel="icon" href="img/Gemini_Generated_Image_bo9w5fbo9w5fbo9w-removebg-preview.png">
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar-custom">
    <div class="navbar-left">
        <img src="img/logo de procesados sin NIT.png" class="logo-navbar">
        <span class="empresa-nombre">Procesados Margarita SAS</span>
    </div>

    <div class="acciones-navbar">

        <a href="/panel" class="btn btn-light">
    <i class="fas fa-arrow-left"></i> Volver
</a>

        <a href="/logout" class="btn-logout">
            <i class="fas fa-power-off"></i> Cerrar sesión
        </a>

    </div>
</nav>

<!-- CONTENIDO -->
<div class="empleados-container">

    <div class="titulo-empleados">
        <h2>Módulo de Empleados</h2>
    </div>

    <div class="modulos-empleados">

        <!-- 🔹 CREAR -->
        <div class="modulo-card" onclick="limpiarEmpleado(); window.location.href='/crear-empleado'">
            <i class="fas fa-user-plus icono-modulo"></i>
            <span>Crear empleado</span>
        </div>

        <!-- 🔹 VER -->
        <div class="modulo-card" onclick="window.location.href='/empleados'">
            <i class="fas fa-search icono-modulo"></i>
            <span>Ver empleados</span>
        </div>

        <!-- 🔹 DESACTIVADOS -->
        <div class="modulo-card" onclick="window.location.href='/empleados-inactivos'">
            <i class="fas fa-user-slash icono-modulo"></i>
            <span>Desactivados</span>
        </div>

    </div>

</div>

<!-- 🔥 SCRIPT -->
<script>
function limpiarEmpleado() {
    localStorage.removeItem("empleadoEditar");
}
</script>

</body>
</html>
