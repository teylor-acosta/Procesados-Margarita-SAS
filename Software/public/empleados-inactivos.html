<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empleados Inactivos</title>

<!-- FUENTE -->
<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- ESTILOS -->
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/empleados-inactivos.css">

</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar-custom">
    <div class="navbar-left">
        <img src="img/logo de procesados sin NIT.png" class="logo-navbar">
        <span class="empresa-nombre">Procesados Margarita SAS</span>
    </div>

    <div style="display:flex; gap:10px;">
        <a href="/empleados-menu" class="btn btn-light">
            <i class="fas fa-arrow-left"></i> Volver
        </a>

        <a href="/logout" class="btn-logout">
            <i class="fas fa-power-off"></i> Cerrar sesión
        </a>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="empleados-container">

    <!-- TITULO -->
    <div class="titulo-panel text-center mb-4">
        <h2>Empleados Inactivos</h2>
    </div>

    <!-- 🔎 FILTROS -->
    <div class="filtros-barra">

        <input id="buscador" class="form-control input-busqueda" placeholder="Buscar empleado...">

        <select id="filtroArea" class="form-control filtro">
            <option value="">Área</option>
        </select>

        <select id="filtroSede" class="form-control filtro">
            <option value="">Sede</option>
        </select>

        <select id="filtroCargo" class="form-control filtro">
            <option value="">Cargo</option>
        </select>

        <button id="btnLimpiar" class="btn btn-secondary btn-icon">
            <i class="fas fa-broom"></i>
        </button>

    </div>

    <!-- 🔥 TABLA -->
    <div class="tabla-container">

        <div class="table-responsive">

            <table class="tabla-corporativa">

                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Documento</th>
                        <th>Tipo Doc</th>
                        <th>Fecha Nac</th>
                        <th>Área</th>
                        <th>Sede</th>
                        <th>Cargo</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody id="tablaInactivos"></tbody>

            </table>

        </div>

    </div>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/empleados-inactivos.js"></script>

</body>
</html>
