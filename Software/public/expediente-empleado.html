<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expediente Empleado</title>

<!-- FUENTE -->
<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- ESTILOS -->
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/expediente-empleado.css">

<link rel="icon" href="/img/Gemini_Generated_Image_bo9w5fbo9w5fbo9w-removebg-preview.png">

</head>

<body>

<!-- =========================================
     🔝 NAVBAR
========================================= -->

<nav class="navbar-custom">

    <div class="navbar-left">

        <img 
            src="/img/logo de procesados sin NIT.png" 
            class="logo-navbar"
        >

        <span class="empresa-nombre">
            Procesados Margarita SAS
        </span>

    </div>

    <div class="acciones-navbar">

        <a href="/documentacion-empleados" class="btn btn-light">

            <i class="fas fa-arrow-left"></i>
            Volver

        </a>

        <a href="/logout" class="btn-logout">

            <i class="fas fa-power-off"></i>
            Cerrar sesión

        </a>

    </div>

</nav>


<!-- =========================================
     🎯 CONTENIDO
========================================= -->

<div class="expediente-container">

    <!-- =====================================
         👤 INFORMACIÓN EMPLEADO
    ====================================== -->

    <div class="card-empleado-info">

        <!-- =================================
             🪪 CARNET
        ================================== -->

        <div class="carnet-empleado">

            <div class="carnet-header">

                <img 
                    src="/img/logo de procesados solo.png"
                    class="logo-carnet"
                >

                <span>
                    Procesados Margarita SAS
                </span>

            </div>

            <img 
                id="fotoEmpleado"
                src="/img/defecto.jpg"
                class="foto-carnet"
            >

            <h4 id="nombreCarnet">
                Cargando...
            </h4>

            <p id="documentoCarnet">
                Documento
            </p>

            <div class="info-carnet">

                <span id="rhCarnet">
                    RH
                </span>

                <span id="cargoCarnet">
                    Cargo
                </span>

            </div>

        </div>


        <!-- =================================
             📄 DATOS
        ================================== -->

        <div class="datos-empleado">

            <h2 id="nombreEmpleado">
                Cargando...
            </h2>

            <div class="info-grid">

                <div>
                    <strong>Código:</strong>
                    <span id="codigoEmpleado"></span>
                </div>

                <div>
                    <strong>Cargo:</strong>
                    <span id="cargoEmpleado"></span>
                </div>

                <div>
                    <strong>Área:</strong>
                    <span id="areaEmpleado"></span>
                </div>

                <div>
                    <strong>Sede:</strong>
                    <span id="sedeEmpleado"></span>
                </div>

            </div>

            <!-- BARRA -->

            <div class="progreso-general">

                <div class="d-flex justify-content-between">

                    <span>
                        Documentación completada
                    </span>

                    <span id="porcentajeGeneral">
                        0%
                    </span>

                </div>

                <div class="progress mt-2">

                    <div 
                        id="barraGeneral"
                        class="progress-bar bg-success"
                        style="width:0%"
                    >
                    </div>

                </div>

            </div>

        </div>

    </div>


    <!-- =====================================
         📂 DOCUMENTOS
    ====================================== -->

    <div 
        class="documentos-grid"
        id="contenedorDocumentos"
    >
    </div>

</div>


<!-- =========================================
     🚀 SCRIPT
========================================= -->

<script src="/js/expediente-empleado.js"></script>

</body>
</html>
