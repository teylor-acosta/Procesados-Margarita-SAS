<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Actividad</title>

<!-- FUENTE -->
<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- ESTILOS -->
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/centro-actividad.css">

<link rel="icon" href="img/Gemini_Generated_Image_bo9w5fbo9w5fbo9w-removebg-preview.png">

</head>

<body>


<!-- =========================================
     🔥 NAVBAR
========================================= -->

<nav class="navbar-custom">

    <div class="navbar-left">

        <img 
            src="img/logo de procesados sin NIT.png"
            class="logo-navbar"
        >

        <span class="empresa-nombre">
            Procesados Margarita SAS
        </span>

    </div>

    <div class="acciones-navbar">

        <a href="/empleados-menu" class="btn btn-light">

            <i class="fas fa-arrow-left"></i>

            Volver

        </a>

        <a href="/logout" class="btn-logout">

            <i class="fas fa-power-off"></i>

            Cerrar sesión

        </a>

    </div>

</nav>



<!-- =========================================
     🔥 CONTENIDO
========================================= -->

<div class="actividad-container">


    <!-- =====================================
         🎯 TITULO
    ====================================== -->

    <div class="titulo-actividad">

        <h2>
            Centro de Actividad
        </h2>

    </div>



    <!-- =====================================
         🔍 FILTROS
    ====================================== -->

    <div class="filtros-actividad">

        <input 
            type="text"
            id="buscarActividad"
            class="form-control"
            placeholder="Buscar actividad..."
        >

        <select id="filtroAccion" class="form-select">

            <option value="">
                Todas las acciones
            </option>

            <option value="CREAR">
                Empleados creados
            </option>

            <option value="ACTUALIZAR">
                Actualizaciones
            </option>

            <option value="DOCUMENTO">
                Documentos
            </option>

            <option value="DESACTIVAR">
                Desactivaciones
            </option>

        </select>

    </div>



    <!-- =====================================
         📊 RESUMEN
    ====================================== -->

    <div class="resumen-actividad">

        <div class="card-resumen verde">

            <i class="fas fa-user-plus"></i>

            <div>

                <h3 id="totalCreaciones">
                    0
                </h3>

                <span>
                    Empleados creados
                </span>

            </div>

        </div>



        <div class="card-resumen azul">

            <i class="fas fa-pen"></i>

            <div>

                <h3 id="totalActualizaciones">
                    0
                </h3>

                <span>
                    Actualizaciones
                </span>

            </div>

        </div>



        <div class="card-resumen morado">

            <i class="fas fa-file-upload"></i>

            <div>

                <h3 id="totalDocumentos">
                    0
                </h3>

                <span>
                    Documentos
                </span>

            </div>

        </div>



        <div class="card-resumen rojo">

            <i class="fas fa-user-slash"></i>

            <div>

                <h3 id="totalDesactivados">
                    0
                </h3>

                <span>
                    Desactivados
                </span>

            </div>

        </div>

    </div>



    <!-- =====================================
         🕒 TIMELINE
    ====================================== -->

    <div id="timelineActividad" class="timeline-actividad">

    </div>

</div>


<!-- =========================================
     🚀 SCRIPT
========================================= -->

<script src="js/centro-actividad.js"></script>

</body>
</html>
