<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Procesados Margarita</title>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="img/Gemini_Generated_Image_bo9w5fbo9w5fbo9w-removebg-preview.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/recuperar.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                    <div class="card-header bg-white text-center py-4 border-0">
                        <img src="img/logo de procesados sin NIT.png" alt="Logo" width="100" class="mb-3 img-fluid">
                        <h4 class="fw-bold text-success">Recuperar Acceso</h4>
                        <p class="text-muted small">Ingresa tu documento para verificar tu identidad</p>
                    </div>
                    <div class="card-body p-4 pt-0">
                        <form id="recuperarForm">
                            <div class="mb-4">
                                <label class="form-label fw-bold">Número de Documento</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-id-card"></i></span>
                                    <input type="text" id="documento" name="documento" class="form-control" required>
                                </div>
                            </div>
                            
                            <button type="submit" id="btnRecuperar" class="btn-gradient w-100 py-2 shadow-sm">
                                <i class="fas fa-search me-2"></i>Consultar Cuenta
                            </button>

                            <div id="mensaje" class="mt-3 text-center p-2 rounded" style="display: none;"></div>

                            <hr class="my-4">
                            <div class="text-center">
                                <a href="/login" class="text-success text-decoration-none small fw-bold">
                                    <i class="fas fa-arrow-left me-1"></i> Regresar al login
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/recuperar.js"></script>
</body>
</html>
