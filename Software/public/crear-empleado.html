<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Empleado</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="dashboard-body">

<nav class="navbar-custom">
    <div class="navbar-left">
        <span class="empresa-nombre">Crear Empleado</span>
    </div>

    <div class="navbar-right">
        <a href="/empleados" class="btn btn-light">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </div>
</nav>

<div class="container mt-5">

<div class="card card-custom p-4">

<form id="formEmpleado">

<div class="row">

<div class="col-md-6">
<label>Nombre</label>
<input type="text" name="nombre" class="form-control">
</div>

<div class="col-md-6">
<label>Tipo documento</label>
<input type="text" name="tipo_documento" class="form-control">
</div>

<div class="col-md-6">
<label>Documento</label>
<input type="text" name="numero_documento" class="form-control">
</div>

<div class="col-md-6">
<label>RH</label>
<input type="text" name="rh" class="form-control">
</div>

<div class="col-md-6">
<label>Fecha nacimiento</label>
<input type="date" name="fecha_nacimiento" class="form-control">
</div>

<div class="col-md-6">
<label>Lugar nacimiento</label>
<input type="text" name="lugar_nacimiento" class="form-control">
</div>

<div class="col-md-6">
<label>Estado civil</label>
<input type="text" name="estado_civil" class="form-control">
</div>

<div class="col-md-6">
<label>Dirección</label>
<input type="text" name="direccion" class="form-control">
</div>

<div class="col-md-6">
<label>Barrio</label>
<input type="text" name="barrio_localidad" class="form-control">
</div>

<div class="col-md-6">
<label>Teléfono</label>
<input type="text" name="telefono" class="form-control">
</div>

<div class="col-md-6">
<label>Email</label>
<input type="email" name="email" class="form-control">
</div>

</div>

<button class="btn btn-success mt-3 w-100">Guardar</button>

</form>

</div>

</div>

<script src="/js/auth.js"></script>
<script src="js/crear-empleado.js"></script>
</body>
</html>
