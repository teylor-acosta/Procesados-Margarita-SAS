<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear / Editar Empleado</title>

<!-- FUENTE -->
<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- ESTILOS -->
<link rel="stylesheet" href="css/style.css"> <!-- generales -->
<link rel="stylesheet" href="css/crear-empleado.css">

<link rel="icon" href="img/Gemini_Generated_Image_bo9w5fbo9w5fbo9w-removebg-preview.png">
</head>

<body>

<!-- 🔥 NAVBAR CORPORATIVO -->
<nav class="navbar-custom">
    <div class="navbar-left">
        <img src="img/logo de procesados sin NIT.png" class="logo-navbar">
        <span class="empresa-nombre">Procesados Margarita SAS</span>
    </div>

    <div style="display:flex; gap:10px;">
        <button class="btn btn-light" onclick="history.back()">
            <i class="fas fa-arrow-left"></i> Volver
        </button>

        <a href="/logout" class="btn-logout">
            <i class="fas fa-power-off"></i> Cerrar sesión
        </a>
    </div>
</nav>

<!-- 🔥 CONTENIDO -->
<div class="crear-container">

    <div class="form-card">

        <h4 class="titulo-form">Registro de empleado</h4>

        <form id="formEmpleado">

            <input type="hidden" id="empleado_id" name="id">

            <div class="row g-3">

                <div class="col-md-6">
                    <label>Nombres</label>
                    <input type="text" id="nombres" name="nombre" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Apellidos</label>
                    <input type="text" id="apellidos" name="apellidos" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Tipo documento</label>
                    <select id="tipo_documento" name="tipo_documento" class="form-control">
                        <option value="">Seleccione</option>
                        <option value="CC">CC</option>
                        <option value="TI">TI</option>
                        <option value="CE">CE</option>
                        <option value="PAS">PAS</option>
                        <option value="PPT">PPT</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label>Número documento</label>
                    <input type="text" id="numero_documento" name="numero_documento" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Fecha nacimiento</label>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Lugar nacimiento</label>
                    <input type="text" id="lugar_nacimiento" name="lugar_nacimiento" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>RH</label>
                    <input type="text" id="rh" name="rh" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Estado civil</label>
                    <input type="text" id="estado_civil" name="estado_civil" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Dirección</label>
                    <input type="text" id="direccion" name="direccion" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Barrio</label>
                    <input type="text" id="barrio_localidad" name="barrio_localidad" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Teléfono</label>
                    <input type="text" id="telefono" name="telefono" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Email</label>
                    <input type="email" id="email" name="email" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Área</label>
                    <select id="area" name="area_id" class="form-control">
                        <option value="">Seleccione</option>
                        <option value="1">Logistica</option>
                        <option value="2">Administrativa</option>
                        <option value="3">Produccion</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Sede</label>
                    <select id="sede" name="sede_id" class="form-control">
                        <option value="">Seleccione</option>
                        <option value="1">ECA#1(BODEGA GRANDE)</option>
                        <option value="2">ECA#2(MISTER)</option>
                        <option value="3">ECA#3(ALIRIO)</option>
                        <option value="4">ECA#4(MOLINO)</option>
                        <option value="5">ECA#5(CARTON)</option>
                        <option value="6">ECA#6(OSCAR)</option>
                        <option value="7">ECA#7(STIVEN)</option>
                        <option value="8">ECA#8(MAIKY)</option>
                        <option value="9">ECA 9</option>
                        <option value="10">ECA10</option>
                        <option value="11">ECA11</option>
                        <option value="12">OFICINA</option>
                        <option value="13">SOACHA</option>
                        <option value="14">SOPO</option>
                        <option value="15">Circulante</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Cargo</label>
                    <select id="cargo" name="cargo_id" class="form-control">
                        <option value="">Seleccione</option>
                        <option value="1">Conductor</option>
                        <option value="2">Gerente</option>
                        <option value="3">Clasificación</option>
                        <option value="4">Operario</option>
                        <option value="5">Director</option>
                        <option value="6">Jefe</option>
                        <option value="7">Líder</option>
                        <option value="8">Asistente</option>
                        <option value="9">Auxiliar</option>
                        <option value="11">Aprendiz SENA</option>
                    </select>
                </div>

            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn-guardar">
                    Guardar empleado
                </button>
            </div>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/crear-empleado.js"></script>

</body>
</html>
