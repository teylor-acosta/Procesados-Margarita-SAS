<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear / Editar Empleado</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="dashboard-body">

<nav class="navbar-custom">
    <div class="navbar-left">
        <span class="empresa-nombre">Empleado</span>
    </div>

    <div class="navbar-right">
        <a href="/empleados" class="btn btn-light">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </div>
</nav>

<div class="container mt-4">

<div class="card card-custom p-4 shadow">

<h4 class="text-center mb-4">Registro de empleado</h4>

<form id="formEmpleado">

<!-- 🔥 ID OCULTO -->
<input type="hidden" id="empleado_id">

<div class="row g-3">

<div class="col-md-6">
<label>Nombres</label>
<input type="text" name="nombres" class="form-control">
</div>

<div class="col-md-6">
<label>Apellidos</label>
<input type="text" name="apellidos" class="form-control">
</div>

<div class="col-md-6">
<label>Tipo documento</label>
<select name="tipo_documento" class="form-control">
<option value="">Seleccione</option>
<option value="CC">CC</option>
<option value="TI">TI</option>
<option value="CE">CE</option>
<option value="PAS">PAS</option>
</select>
</div>

<div class="col-md-6">
<label>Número documento</label>
<input type="text" name="numero_documento" class="form-control">
</div>

<div class="col-md-4">
<label>Fecha nacimiento</label>
<input type="date" name="fecha_nacimiento" class="form-control">
</div>

<div class="col-md-4">
<label>Lugar nacimiento</label>
<input type="text" name="lugar_nacimiento" class="form-control">
</div>

<div class="col-md-4">
<label>RH</label>
<input type="text" name="rh" class="form-control">
</div>

<div class="col-md-4">
<label>Estado civil</label>
<input type="text" name="estado_civil" class="form-control">
</div>

<div class="col-md-4">
<label>Dirección</label>
<input type="text" name="direccion" class="form-control">
</div>

<div class="col-md-4">
<label>Barrio</label>
<input type="text" name="barrio_localidad" class="form-control">
</div>

<div class="col-md-6">
<label>Teléfono</label>
<input type="text" name="telefono" class="form-control">
</div>

<div class="col-md-6">
<label>Email</label>
<input type="email" name="email" class="form-control">
</div>

<div class="col-md-4">
<label>Área</label>
<select name="area_id" class="form-control"></select>
</div>

<div class="col-md-4">
<label>Sede</label>
<select name="sede_id" class="form-control"></select>
</div>

<div class="col-md-4">
<label>Cargo</label>
<select name="cargo_id" class="form-control"></select>
</div>

</div>

<div class="text-center mt-4">
<button class="btn btn-success px-5">
Guardar empleado
</button>
</div>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/crear-empleado.js"></script>

</body>
</html>
