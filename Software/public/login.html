<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Procesados Margarita</title>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="img/Gemini_Generated_Image_bo9w5fbo9w5fbo9w-removebg-preview.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card-custom">
                <div class="card-header-custom">
                    <img src="img/logo de procesados sin NIT.png" alt="Logo" width="100" class="mb-3 img-fluid">
                    <h3>Iniciar Sesión</h3>
                    <p class="text-primary mb-0">Sistema ERP Procesados Margarita</p>
                </div>
                <div class="card-body-custom">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" name="usuario" class="form-control" placeholder="Ingrese su usuario" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Ingresar
                        </button>
                        <hr class="my-4">
                        <div class="text-center">
                            <a href="/recuperar" class="text-primary text-decoration-none">
                                <i class="fas fa-key me-1"></i>¿Olvidaste tu contraseña?
                            </a>
                        </div>
                    </form>
                    <div id="mensaje" class="alert-custom" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="/js/auth.js"></script>
<script src="js/login.js"></script>

</body>
</html>
