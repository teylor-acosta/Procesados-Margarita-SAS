<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - Procesados Margarita</title>

    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="img/Gemini_Generated_Image_bo9w5fbo9w5fbo9w-removebg-preview.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/cambiar-password.css">
</head>

<!-- 🔥 CAMBIO 1: CENTRAR TODO -->
<body class="d-flex justify-content-center align-items-center min-vh-100 bg-light">

<div class="container">
    <div class="row justify-content-center">

        <!-- 🔥 CAMBIO 2: MEJOR ANCHO -->
        <div class="col-12 col-md-8 col-lg-6 col-xl-5">

            <div class="card-custom p-4">

                <div class="text-center mb-3">
                    <img src="img/logo de procesados sin NIT.png" alt="Logo" width="80" class="mb-2 img-fluid">
                    <h3 class="fw-bold">Cambio de Contraseña</h3>
                    <p class="text-primary small">Por seguridad debes actualizar tu contraseña</p>
                </div>

                <div class="card-body-custom">

                    <form id="formPassword">

                        <div class="mb-3">
                            <label class="form-label">Nueva contraseña</label>
                            <input type="password" id="password" class="form-control" placeholder="Ingrese nueva contraseña" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Confirmar contraseña</label>
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirme nueva contraseña" required>
                        </div>

                        <button type="submit" class="btn btn-gradient w-100 py-2">
                            <i class="fas fa-save me-2"></i>Guardar contraseña
                        </button>

                    </form>

                    <div id="mensaje" class="mt-3 text-center" style="display: none;"></div>

                </div>

            </div>

        </div>

    </div>
</div>

<script src="js/cambiar-password.js"></script>

</body>
</html>
