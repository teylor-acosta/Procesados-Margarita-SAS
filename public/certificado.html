<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificado - Procesados Margarita</title>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="certificado-container">
    <div class="container-fluid">
        <div id="certificadoContent">
            <div class="text-center p-5">
                <div class="spinner-border text-success" role="status"></div>
                <p class="mt-3">Generando certificado...</p>
            </div>
        </div>
        
        <div class="text-center no-print mt-4">
            <button class="btn-pdf" onclick="generarPDF()">
                <i class="fas fa-file-pdf"></i> Descargar PDF
            </button>
            <button class="btn btn-secondary ms-2" onclick="window.location.href='/dashboard'">
                <i class="fas fa-home"></i> Inicio
            </button>
        </div>
    </div>
</div>

<script src="js/certificado.js"></script>
</body>
</html>
