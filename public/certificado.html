<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificado - Procesados Margarita</title>

<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="certificado-container">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-12">
                <div id="certificadoContent">
                    <div class="text-center p-5">
                        <div class="spinner-border text-success" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                        <p class="mt-3">Generando certificado...</p>
                    </div>
                </div>
                
                <div class="text-center no-print mt-4">
                    <button class="btn-pdf" onclick="generarPDF()">
                        <i class="fas fa-file-pdf"></i> Descargar PDF
                    </button>
                    <button class="btn-gradient ms-2" onclick="window.print()">
                        <i class="fas fa-print"></i> Imprimir
                    </button>
                    <button class="btn btn-secondary ms-2" onclick="window.location.href='/dashboard'">
                        <i class="fas fa-home"></i> Inicio
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let datosCertificado = null;

    document.addEventListener('DOMContentLoaded', async () => {
        await generarCertificado();
    });

    async function generarCertificado() {
        try {
            const response = await fetch('/api/datos-certificado');
            const result = await response.json();
            
            if (result.success && result.datos) {
                datosCertificado = result.datos;
                renderizarCertificado();
            } else {
                document.getElementById('certificadoContent').innerHTML = `
                    <div class="alert alert-danger text-center">
                        <i class="fas fa-exclamation-triangle fa-2x"></i>
                        <h4>No se pudo generar el certificado</h4>
                        <p>Asegúrate de haber completado toda la inducción y haber firmado digitalmente.</p>
                        <a href="/induccion" class="btn-gradient mt-3">Volver a inducción</a>
                    </div>
                `;
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('certificadoContent').innerHTML = `
                <div class="alert alert-danger">Error al generar el certificado</div>
            `;
        }
    }

    function renderizarCertificado() {
        const fecha = new Date(datosCertificado.fecha_emision);
        const fechaFormateada = fecha.toLocaleDateString('es-CO', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        
        const anio = fecha.getFullYear();
        const mes = fecha.toLocaleString('es-CO', { month: 'long' });
        const dia = fecha.getDate();
        
        let html = `
            <div class="certificado-pdf" id="certificadoParaPDF">
                <div class="marca-agua">
                    <img src="img/marca_agua.png" alt="Marca de agua">
                </div>
                
                <div class="contenido-certificado">
                    <div class="certificado-header">
                        <img src="img/9903400.png" alt="Logo" class="certificado-logo">
                        <h1 class="certificado-titulo-principal">PROCESADOS MARGARITA SAS</h1>
                        <h3 class="certificado-subtitulo">Certificado de Inducción</h3>
                        <div class="certificado-linea"></div>
                    </div>
                    
                    <div class="certificado-texto">
                        <p>El Sistema de Gestión de Seguridad y Salud en el Trabajo (SG-SST)</p>
                        <p>de <strong>Procesados Margarita SAS</strong></p>
                        <p>Certifica que:</p>
                    </div>
                    
                    <div class="certificado-nombre">
                        ${datosCertificado.nombre}
                    </div>
                    
                    <div class="certificado-datos">
                        <p>Identificado(a) con Cédula de Ciudadanía No. <strong>${datosCertificado.numero_documento}</strong></p>
                        <p>Código de empleado: <strong>${datosCertificado.codigo}</strong></p>
                    </div>
                    
                    <div class="certificado-curso">
                        <p>Completó y aprobó satisfactoriamente el curso de:</p>
                        <p class="certificado-curso-titulo">INDUCCIÓN EMPRESARIAL PROCESADOS MARGARITA SAS</p>
                    </div>
                    
                    <div class="certificado-modulos">
                        <p>Que incluye los siguientes módulos:</p>
                        <ul>
                            <li>Reglamento Interno de Trabajo</li>
                            <li>Política de Prevención de Consumo de Tabaco, Alcohol y Drogas</li>
                            <li>Política de Tratamiento de Datos Personales</li>
                        </ul>
                    </div>
                    
                    <div class="certificado-fecha">
                        <p>Realizado luego de cumplir con las actividades programadas y reunir los requisitos exigidos,</p>
                        <p>se firma el presente en Bogotá D.C., a los <strong>${dia}</strong> días del mes de <strong>${mes}</strong> de <strong>${anio}</strong></p>
                    </div>
                    
                    <div class="certificado-firmas">
                        <div class="firma-empleado">
                            ${datosCertificado.firma_data ? 
                                `<img src="${datosCertificado.firma_data}" alt="Firma empleado" style="filter: brightness(0) contrast(1);">` : 
                                '<div class="firma-linea"></div>'
                            }
                            <div class="firma-nombre">${datosCertificado.nombre}</div>
                            <div class="firma-cargo">Empleado</div>
                        </div>
                        
                        <div class="firma-representante">
                            <div class="firma-linea"></div>
                            <div class="firma-nombre">Maria Margarita Herrera</div>
                            <div class="firma-cargo">Representante Legal</div>
                            <div class="firma-cargo">CC: 51.727.438</div>
                        </div>
                    </div>
                    
                    <div class="certificado-pie">
                        <div class="certificado-codigo">
                            <strong>Código de certificado:</strong> ${datosCertificado.codigo_certificado}
                        </div>
                        <div class="certificado-codigo">
                            <strong>Nota final:</strong> ${Math.round(datosCertificado.nota_final)}%
                        </div>
                        <div class="certificado-codigo">
                            <strong>Fecha de emisión:</strong> ${fechaFormateada}
                        </div>
                        <p class="mt-3">La autenticidad de este documento puede verificarse en el sistema ERP de Procesados Margarita SAS</p>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('certificadoContent').innerHTML = html;
    }

    async function generarPDF() {
        const element = document.getElementById('certificadoParaPDF');
        
        if (!element) {
            alert('No se puede generar el PDF');
            return;
        }
        
        const btn = document.querySelector('.btn-pdf');
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generando PDF...';
        btn.disabled = true;
        
        try {
            const canvas = await html2canvas(element, {
                scale: 2,
                backgroundColor: '#ffffff',
                logging: false
            });
            
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: 'a4'
            });
            
            const imgWidth = 277;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            pdf.save(`Certificado_Induccion_${datosCertificado.codigo_certificado}.pdf`);
            
        } catch (error) {
            console.error('Error al generar PDF:', error);
            alert('Error al generar el PDF. Intenta de nuevo.');
        } finally {
            btn.innerHTML = textoOriginal;
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
