<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar Contraseña - Procesados Margarita</title>

<!-- Google Fonts - Averia Libre -->
<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card-custom">
                <div class="card-header-custom">
                    <img src="img/logo de procesados sin NIT.png" alt="Logo" width="80" class="mb-3 img-fluid">
                    <h3>Recuperar Contraseña</h3>
                    <p class="text-secondary mb-0">Ingrese su número de documento</p>
                </div>
                <div class="card-body-custom">
                    <form id="recuperarForm">
                        <div class="mb-4">
                            <label class="form-label">Número de Documento</label>
                            <input type="text" name="documento" class="form-control" placeholder="Ingrese su documento" required>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100">
                            <i class="fas fa-search me-2"></i>Recuperar
                        </button>
                        <hr class="my-4">
                        <div class="text-center">
                            <a href="/login" class="text-primary text-decoration-none">
                                <i class="fas fa-arrow-left me-1"></i>Volver al inicio de sesión
                            </a>
                        </div>
                    </form>
                    <div id="mensaje" class="alert-custom"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('recuperarForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const mensajeDiv = document.getElementById('mensaje');
    
    try {
        const response = await fetch('/api/recuperar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ documento: formData.get('documento') })
        });
        
        const result = await response.json();
        
        mensajeDiv.style.display = 'block';
        
        if (result.success) {
            mensajeDiv.className = 'alert-custom alert-success-custom';
            mensajeDiv.innerHTML = `<i class="fas fa-check-circle me-2"></i>${result.message}`;
            setTimeout(() => {
                window.location.href = '/login';
            }, 3000);
        } else {
            mensajeDiv.className = 'alert-custom alert-error-custom';
            mensajeDiv.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i>${result.message}`;
        }
        
        setTimeout(() => {
            mensajeDiv.style.display = 'none';
        }, 5000);
        
    } catch (error) {
        mensajeDiv.className = 'alert-custom alert-error-custom';
        mensajeDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Error de conexión';
    }
});
</script>

</body>
</html>
