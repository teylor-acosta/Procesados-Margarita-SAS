<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Procesados Margarita</title>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-white shadow-sm border-bottom border-success border-3 navbar-fixed">
        <div class="container-fluid py-2 px-3 px-md-5">
            <div class="d-flex align-items-center gap-3">
                <img src="img/9903400.png" alt="Logo" width="55" height="55" class="rounded-circle bg-white p-1 shadow-sm">
                <div class="empresa-nombre">
                    <div class="empresa-linea1">Procesados</div>
                    <div class="empresa-linea2">Margarita SAS</div>
                </div>
            </div>
            <button id="btnAccionHeader" class="btn-cerrar-sesion-custom" onclick="accionHeader()">
                <i class="fas fa-sign-out-alt me-2"></i>Cerrar sesión
            </button>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div id="contenidoDashboard">
                <div class="text-center p-5">
                    <div class="spinner-border text-success" role="status"></div>
                    <p class="mt-3 text-success">Cargando tu panel de control...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
