<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inducción - Procesados Margarita</title>

<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="induccion-container">
    <div class="induccion-header">
        <div class="d-flex align-items-center gap-3">
            <img src="img/9903400.png" alt="Logo" width="50" class="rounded-circle">
            <div>
                <div class="empresa-linea1">Procesados</div>
                <div class="empresa-linea2">Margarita SAS</div>
            </div>
        </div>
        <div>
            <span class="text-danger fw-bold">⚠️ Inducción Obligatoria</span>
        </div>
    </div>
    
    <div class="container">
        <div id="contenidoInduccion">
            <div class="text-center p-5">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-3">Cargando contenido de inducción...</p>
            </div>
        </div>
    </div>
</div>

<div id="modalVideo" class="modal-video">
    <div class="modal-video-content">
        <button class="close-modal" onclick="cerrarModal()">&times;</button>
        <video id="videoPlayer" controls style="width:100%; height:400px; border-radius:10px;">
            <source src="" type="video/mp4">
            Tu navegador no soporta el elemento de video.
        </video>
        <div class="text-center mt-3">
            <button id="btnMarcarVisto" class="btn-marcar-visto">
                <i class="fas fa-check-circle"></i> Marcar como visto
            </button>
        </div>
    </div>
</div>

<script>
    let capitulosData = [];
    let subCapitulosData = {};
    let progresoGeneral = {};
    let subCapituloActual = null;

    document.addEventListener('DOMContentLoaded', async () => {
        await cargarDatos();
    });

    async function cargarDatos() {
        try {
            const [capitulosRes, progresoRes] = await Promise.all([
                fetch('/api/capitulos-induccion'),
                fetch('/api/progreso-general')
            ]);
            
            const capitulosResult = await capitulosRes.json();
            const progresoResult = await progresoRes.json();
            
            if (capitulosResult.success) {
                capitulosData = capitulosResult.capitulos;
            }
            
            if (progresoResult.success) {
                progresoGeneral = progresoResult.progreso;
            }
            
            renderizarInduccion();
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('contenidoInduccion').innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle"></i> Error al cargar la inducción
                </div>
            `;
        }
    }

    async function cargarSubCapitulos(capituloId) {
        try {
            const response = await fetch(`/api/sub-capitulos/${capituloId}`);
            const result = await response.json();
            
            if (result.success) {
                subCapitulosData[capituloId] = result.sub_capitulos;
                renderizarInduccion();
                const body = document.getElementById(`capitulo-body-${capituloId}`);
                if (body) {
                    body.style.display = 'block';
                }
            }
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function renderizarInduccion() {
        if (!capitulosData.length) {
            document.getElementById('contenidoInduccion').innerHTML = `
                <div class="alert alert-warning">
                    No hay capítulos de inducción configurados.
                </div>
            `;
            return;
        }
        
        let capitulosAprobados = capitulosData.filter(c => c.aprobado === 1).length;
        let porcentajeGeneral = (capitulosAprobados / capitulosData.length) * 100;
        
        let html = `
            <div class="mb-4">
                <div class="d-flex justify-content-between mb-2">
                    <span><strong>Progreso General:</strong> ${capitulosAprobados}/${capitulosData.length} capítulos aprobados</span>
                    <span><strong>${Math.round(porcentajeGeneral)}%</strong></span>
                </div>
                <div class="progreso-bar">
                    <div class="progreso-fill" style="width: ${porcentajeGeneral}%"></div>
                </div>
            </div>
        `;
        
        capitulosData.forEach(capitulo => {
            const videosVistos = capitulo.videos_vistos || 0;
            const totalVideos = capitulo.total_videos || 0;
            const porcentajeVideos = totalVideos > 0 ? (videosVistos / totalVideos) * 100 : 0;
            const estaAprobado = capitulo.aprobado === 1;
            const videosCompletos = videosVistos === totalVideos;
            const subCapitulos = subCapitulosData[capitulo.id];
            
            html += `
                <div class="capitulo-card">
                    <div class="capitulo-header" onclick="toggleCapitulo(${capitulo.id})">
                        <h3><i class="fas fa-book-open"></i> ${capitulo.titulo}</h3>
                        <div class="capitulo-badge">
                            ${estaAprobado ? 
                                '<span class="badge-aprobado"><i class="fas fa-check-circle"></i> Aprobado</span>' : 
                                '<span class="badge-pendiente"><i class="fas fa-clock"></i> Pendiente</span>'
                            }
                            <span class="progreso-texto">${videosVistos}/${totalVideos} videos</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="capitulo-body" id="capitulo-body-${capitulo.id}" style="display: none;">
                        <p class="text-muted mb-3">${capitulo.descripcion || ''}</p>
                        <div class="progreso-bar mb-3">
                            <div class="progreso-fill" style="width: ${porcentajeVideos}%"></div>
                        </div>
                        <div id="subcapitulos-${capitulo.id}">
            `;
            
            if (subCapitulos && subCapitulos.length) {
                subCapitulos.forEach(sub => {
                    const visto = sub.visto === 1;
                    html += `
                        <div class="sub-capitulo-item">
                            <div class="sub-capitulo-info">
                                ${visto ? 
                                    '<i class="fas fa-check-circle video-completado"></i>' : 
                                    '<i class="fas fa-play-circle"></i>'
                                }
                                <div>
                                    <div class="sub-capitulo-titulo">${sub.numero_sub_capitulo}. ${sub.titulo}</div>
                                    <div class="sub-capitulo-duracion"><i class="fas fa-clock"></i> ${sub.duracion_minutos} min</div>
                                </div>
                            </div>
                            ${!visto ? 
                                `<button class="btn-ver-video" onclick="abrirVideo(${sub.id}, '${sub.url_video}')">
                                    <i class="fas fa-play"></i> Ver video
                                </button>` : 
                                `<span class="text-success"><i class="fas fa-check"></i> Completado</span>`
                            }
                        </div>
                    `;
                });
            } else {
                html += `<div class="text-center text-muted py-3"><i class="fas fa-spinner fa-spin"></i> Cargando videos...</div>`;
            }
            
            html += `
                        </div>
                        ${!estaAprobado && videosCompletos ? `
                            <button class="btn-evaluacion" onclick="irAEvaluacion(${capitulo.id})">
                                <i class="fas fa-clipboard-list"></i> Realizar Evaluación
                            </button>
                        ` : estaAprobado ? `
                            <div class="alert alert-success mt-3 text-center">
                                <i class="fas fa-check-circle"></i> ¡Evaluación aprobada! Nota: ${Math.round(capitulo.nota)}%
                            </div>
                        ` : videosCompletos ? '' : `
                            <div class="alert alert-info mt-3 text-center">
                                <i class="fas fa-info-circle"></i> Debes ver todos los videos para habilitar la evaluación
                            </div>
                        `}
                    </div>
                </div>
            `;
        });
        
        if (capitulosAprobados === capitulosData.length) {
            html += `
                <div class="alert alert-success text-center mt-4">
                    <i class="fas fa-trophy fa-2x mb-2"></i>
                    <h5>¡Felicidades! Has completado toda la inducción</h5>
                    <p>Ahora puedes proceder a firmar digitalmente y obtener tu certificado</p>
                    <button class="btn-gradient mt-2" onclick="window.location.href='/firma'">
                        <i class="fas fa-signature"></i> Firmar y obtener certificado
                    </button>
                </div>
            `;
        }
        
        document.getElementById('contenidoInduccion').innerHTML = html;
    }

    function toggleCapitulo(capituloId) {
        const body = document.getElementById(`capitulo-body-${capituloId}`);
        if (!body) return;
        
        if (body.style.display === 'none' || body.style.display === '') {
            body.style.display = 'block';
            if (!subCapitulosData[capituloId]) {
                cargarSubCapitulos(capituloId);
            }
        } else {
            body.style.display = 'none';
        }
    }

    function abrirVideo(subCapituloId, urlVideo) {
        subCapituloActual = subCapituloId;
        const videoPlayer = document.getElementById('videoPlayer');
        const modal = document.getElementById('modalVideo');
        
        videoPlayer.src = urlVideo;
        modal.style.display = 'flex';
        videoPlayer.play();
        
        const btnMarcar = document.getElementById('btnMarcarVisto');
        const nuevoBoton = btnMarcar.cloneNode(true);
        btnMarcar.parentNode.replaceChild(nuevoBoton, btnMarcar);
        nuevoBoton.onclick = () => marcarComoVisto(subCapituloId);
    }

    // FUNCIÓN CORREGIDA - Redirige a la misma página
    function marcarComoVisto(subCapituloId) {
        // Enviar la petición
        fetch('/api/marcar-visto', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sub_capitulo_id: subCapituloId })
        });
        
        // Cerrar modal y redirigir a la misma página
        cerrarModal();
        window.location.href = '/induccion';
    }

    function irAEvaluacion(capituloId) {
        window.location.href = `/evaluacion?capitulo=${capituloId}`;
    }

    function cerrarModal() {
        const modal = document.getElementById('modalVideo');
        const videoPlayer = document.getElementById('videoPlayer');
        if (modal) modal.style.display = 'none';
        if (videoPlayer) {
            videoPlayer.pause();
            videoPlayer.src = '';
        }
        subCapituloActual = null;
    }
</script>

</body>
</html>
