<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inducción - Procesados Margarita</title>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style_induccion.css">
</head>
<body>
    <div class="background-overlay">
        <nav class="navbar-custom">
            <img src="img/logo de procesados sin NIT.png" height="55" alt="Logo">
            <a href="/logout" class="btn-logout"><i class="fas fa-power-off me-2"></i>Cerrar Sesión</a>
        </nav>

        <div class="container py-4">
            <div class="text-center mb-5">
                <h1 class="titulo-principal">Plan de Inducción Obligatoria</h1>
                <p class="subtitulo-principal text-muted">Visualiza los videos para habilitar tus evaluaciones.</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-10" id="contenedorModulos">
                    </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalVideo" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px; overflow: hidden;">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title">Capacitación Institucional</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" onclick="detenerVideo()"></button>
                </div>
                <div class="modal-body p-0 bg-dark">
                    <div class="ratio ratio-16x9">
                        <video id="videoPlayer" controls controlsList="nodownload">
                            <source id="videoSource" src="" type="video/mp4">
                        </video>
                    </div>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button class="btn btn-confirmar w-100 py-3 fw-bold" id="btnConfirmarVisto">
                        MARCAR COMO VISTO
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/induccion.js"></script>
</body>
</html>
