<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambiar Contraseña - Procesados Margarita</title>

<!-- Google Fonts - Averia Libre -->
<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card-custom">
                <div class="card-header-custom">
                    <img src="img/logo de procesados sin NIT.png" alt="Logo" width="80" class="mb-3 img-fluid">
                    <h3>Cambio de Contraseña</h3>
                    <p class="text-primary mb-0">Por seguridad debes actualizar tu contraseña</p>
                </div>
                <div class="card-body-custom">
                    <form id="formPassword">
                        <div class="mb-3">
                            <label class="form-label">Nueva contraseña</label>
                            <input type="password" id="password" class="form-control" placeholder="Ingrese nueva contraseña" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Confirmar contraseña</label>
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirme nueva contraseña" required>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100">
                            <i class="fas fa-save me-2"></i>Guardar contraseña
                        </button>
                    </form>
                    <div id="mensaje" class="alert-custom"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('formPassword').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const mensajeDiv = document.getElementById('mensaje');
    
    mensajeDiv.style.display = 'block';
    
    if (password !== confirmPassword) {
        mensajeDiv.className = 'alert-custom alert-error-custom';
        mensajeDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Las contraseñas no coinciden';
        setTimeout(() => {
            mensajeDiv.style.display = 'none';
        }, 3000);
        return;
    }
    
    if (password.length < 6) {
        mensajeDiv.className = 'alert-custom alert-error-custom';
        mensajeDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>La contraseña debe tener al menos 6 caracteres';
        setTimeout(() => {
            mensajeDiv.style.display = 'none';
        }, 3000);
        return;
    }
    
    try {
        const response = await fetch('/api/cambiar-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
        });
        
        const result = await response.json();
        
        if (result.success) {
            mensajeDiv.className = 'alert-custom alert-success-custom';
            mensajeDiv.innerHTML = '<i class="fas fa-check-circle me-2"></i>Contraseña actualizada correctamente';
            setTimeout(() => {
                window.location.href = result.redirect || '/';
            }, 1500);
        } else {
            mensajeDiv.className = 'alert-custom alert-error-custom';
            mensajeDiv.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i>${result.message || 'Error al cambiar contraseña'}`;
        }
        
        setTimeout(() => {
            mensajeDiv.style.display = 'none';
        }, 4000);
        
    } catch (error) {
        mensajeDiv.className = 'alert-custom alert-error-custom';
        mensajeDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Error de conexión con el servidor';
    }
});
</script>

</body>
</html>
