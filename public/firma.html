<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firma Digital - Procesados Margarita</title>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="firma-container py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-white text-center py-4 border-bottom border-success border-3">
                        <i class="fas fa-signature fa-3x text-success mb-2"></i>
                        <h3 class="fw-bold">Firma Digital</h3>
                        <p class="text-muted">Formaliza la finalización de tu capacitación</p>
                    </div>
                    <div class="card-body p-4 text-center">
                        <p class="mb-3">Usa tu mouse o el dedo (en dispositivos táctiles) para firmar:</p>
                        
                        <div class="canvas-wrapper mb-3" style="background: #f8f9fa; border-radius: 15px; padding: 10px;">
                            <canvas id="canvasFirma" width="500" height="250" 
                                    style="border: 2px dashed #28a745; border-radius: 10px; background: white; cursor: crosshair; width: 100%; height: auto;">
                            </canvas>
                        </div>
                        
                        <div class="d-flex gap-2 justify-content-center">
                            <button class="btn btn-outline-secondary px-4" onclick="limpiarFirma()">
                                <i class="fas fa-eraser me-1"></i> Borrar
                            </button>
                            <button class="btn-gradient px-4" onclick="guardarFirma()">
                                <i class="fas fa-file-contract me-1"></i> Finalizar Inducción
                            </button>
                        </div>
                        
                        <hr class="my-4">
                        <a href="/induccion" class="text-decoration-none text-muted">
                            <i class="fas fa-chevron-left me-1"></i> Volver a los módulos
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/firma.js"></script>
</body>
</html>
